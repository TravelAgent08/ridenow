
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Now - Business Prototype</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#ffcc00;padding:25px;text-align:center}
section{margin:20px;background:white;padding:20px;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
button{padding:10px 15px}
</style>
</head>
<body>
<header>
<h1>Ride Now</h1>
<p>Ghaziabad - Modinagar Ride Service</p>
<p>Founder: Sumit Chaudhary</p>
</header>

<section>
<h2>Book Ride</h2>
<input placeholder="Pickup Location"><br><br>
<input placeholder="Drop Location"><br><br>
<select>
<option>Bike</option>
<option>Auto</option>
<option>Cab</option>
</select><br><br>
<button>Request Ride (Cash Payment)</button>
</section>

<section>
<h2>Driver Registration</h2>
<input placeholder="Name"><br><br>
<input placeholder="Mobile"><br><br>
<input placeholder="Aadhaar"><br><br>
<input placeholder="Driving Licence"><br><br>
<input placeholder="Vehicle Number"><br><br>
<button>Submit</button>
</section>

<section>
<h2>Admin Dashboard (Demo)</h2>
<table>
<tr><th>Driver</th><th>Status</th></tr>
<tr><td>Sample Driver</td><td>Approved</td></tr>
</table>
</section>

<section>
<h2>Service Area</h2>
<p>Ghaziabad, Modinagar, Muradnagar and nearby areas.</p>
</section>
</body>
</html>
